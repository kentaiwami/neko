apiVersion: apps/v1
kind: Deployment
metadata:
  name: neko
  namespace: neko
spec:
  replicas: 2
  selector:
    matchLabels:
      app: neko
  template:
    metadata:
      labels:
        app: neko
    spec:
      containers:
        - name: neko
          image: __REGISTRY_HOST__:5000/neko:__IMAGE_TAG__
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: neko-secret
                  key: database-url
            - name: VIEW_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: neko-secret
                  key: view-password
